# SecureSync AI Kubernetes Secrets Template
# Copy this file, replace placeholder values, and apply to your cluster.
# Never commit real secret values.

apiVersion: v1
kind: Secret
metadata:
  name: securesync-secrets
  namespace: securesync
type: Opaque
stringData:
  postgres-user: "replace-me"
  postgres-password: "replace-me"
  database-url: "postgresql+psycopg://replace-me:replace-me@securesync-postgres:5432/securesync"
  jwt-secret: "replace-with-long-random-secret"
  razorpay-webhook-secret: "replace-me-if-enabled"
  twilio-account-sid: "replace-me-if-enabled"
  twilio-auth-token: "replace-me-if-enabled"
  openweather-key: "replace-me-if-enabled"
  iqair-key: "replace-me-if-enabled"
  tomtom-key: "replace-me-if-enabled"
  groq-api-key: "replace-me-if-enabled"
