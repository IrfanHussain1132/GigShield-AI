<svg width="860" height="480" viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#ffffff;">

  <defs>
    <!-- Single fixed-color arrow marker, no context-stroke -->
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-bi" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M8 1L2 5L8 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── background panel for external APIs ── -->
  <rect x="20" y="16" width="820" height="92" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="36" y="13" font-size="10" fill="#9ca3af" font-weight="600" letter-spacing="0.08em">EXTERNAL APIs</text>

  <!-- ── background panel for core services ── -->
  <rect x="20" y="170" width="820" height="110" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="36" y="167" font-size="10" fill="#9ca3af" font-weight="600" letter-spacing="0.08em">CORE SERVICES</text>

  <!-- ── background panel for database ── -->
  <rect x="20" y="350" width="820" height="90" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="36" y="347" font-size="10" fill="#9ca3af" font-weight="600" letter-spacing="0.08em">DATABASE</text>

  <!-- ═══════════ ROW 1 – External APIs ═══════════ -->

  <!-- OpenWeatherMap -->
  <rect x="46" y="30" width="190" height="62" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="141" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">OpenWeatherMap</text>
  <text x="141" y="76" text-anchor="middle" font-size="11" fill="#3b82f6">Weather · Rainfall · Heat</text>

  <!-- AQICN -->
  <rect x="270" y="30" width="160" height="62" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="350" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">AQICN</text>
  <text x="350" y="76" text-anchor="middle" font-size="11" fill="#3b82f6">Air Quality Index</text>

  <!-- IMD RSS -->
  <rect x="464" y="30" width="160" height="62" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="544" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">IMD RSS</text>
  <text x="544" y="76" text-anchor="middle" font-size="11" fill="#3b82f6">Flood · Red Alerts</text>

  <!-- Razorpay -->
  <rect x="658" y="30" width="160" height="62" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="738" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Razorpay</text>
  <text x="738" y="76" text-anchor="middle" font-size="11" fill="#16a34a">Payout Gateway</text>

  <!-- ═══════════ Arrows: APIs → Backend ═══════════ -->
  <!-- OWM → Backend (polls) -->
  <path d="M141,92 L141,148 L390,148 L390,180" fill="none" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <!-- AQICN → Backend -->
  <path d="M350,92 L350,148 L420,148 L420,180" fill="none" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <!-- IMD → Backend -->
  <path d="M544,92 L544,148 L450,148 L450,180" fill="none" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <!-- Backend ↔ Razorpay -->
  <path d="M738,92 L738,155 L520,155 L520,180" fill="none" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#arr)" marker-start="url(#arr-bi)"/>

  <!-- Legend: dashed = polls -->
  <line x1="36" y1="147" x2="60" y2="147" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="5,3"/>
  <text x="66" y="151" font-size="10" fill="#9ca3af">polls</text>
  <line x1="106" y1="147" x2="130" y2="147" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#arr)" marker-start="url(#arr-bi)"/>
  <text x="136" y="151" font-size="10" fill="#9ca3af">bidirectional REST</text>

  <!-- ═══════════ ROW 2 – Core Services ═══════════ -->

  <!-- Frontend -->
  <rect x="46" y="184" width="180" height="80" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.2"/>
  <text x="136" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">Frontend</text>
  <text x="136" y="230" text-anchor="middle" font-size="11" fill="#0d9488">Next.js 14 · TypeScript</text>
  <text x="136" y="248" text-anchor="middle" font-size="10" fill="#14b8a6">Policy purchase · Claims</text>

  <!-- Backend (wider, central) -->
  <rect x="270" y="184" width="320" height="80" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.2"/>
  <text x="430" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">Backend</text>
  <text x="430" y="228" text-anchor="middle" font-size="11" fill="#7c3aed">Node.js · Express · TypeScript</text>
  <text x="430" y="246" text-anchor="middle" font-size="10" fill="#8b5cf6">API gateway · Trigger Monitor cron · DB manager</text>

  <!-- ML Service -->
  <rect x="634" y="184" width="184" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.2"/>
  <text x="726" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">ML Service</text>
  <text x="726" y="230" text-anchor="middle" font-size="11" fill="#ea580c">Python · Flask · Scikit</text>
  <text x="726" y="248" text-anchor="middle" font-size="10" fill="#f97316">Premiums · Fraud scoring</text>

  <!-- Arrows between services -->
  <!-- Frontend ↔ Backend -->
  <line x1="226" y1="224" x2="270" y2="224" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#arr)" marker-start="url(#arr-bi)"/>
  <!-- Backend ↔ ML Service -->
  <line x1="590" y1="224" x2="634" y2="224" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#arr)" marker-start="url(#arr-bi)"/>

  <!-- ═══════════ Arrow: Backend ↔ Database ═══════════ -->
  <line x1="430" y1="264" x2="430" y2="360" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#arr)" marker-start="url(#arr-bi)"/>

  <!-- ═══════════ ROW 3 – Database ═══════════ -->
  <rect x="270" y="365" width="320" height="64" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="430" y="390" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">PostgreSQL</text>
  <text x="430" y="408" text-anchor="middle" font-size="11" fill="#1d4ed8">Workers · Policies · Events · Claims</text>

  <!-- ═══════════ Port labels ═══════════ -->
  <rect x="46" y="448" width="96" height="20" rx="4" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="94" y="462" text-anchor="middle" font-size="10" fill="#6b7280">:3000 Frontend</text>

  <rect x="360" y="448" width="140" height="20" rx="4" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="430" y="462" text-anchor="middle" font-size="10" fill="#6b7280">:4000 Backend API</text>

  <rect x="668" y="448" width="130" height="20" rx="4" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="733" y="462" text-anchor="middle" font-size="10" fill="#6b7280">:5001 ML Service</text>

</svg>
