    <style>
        html, body {
            width: 100%;
            height: 100%;
        }

        /* Global Reset */
        body { 
            font-family: 'Noto Sans', 'Inter', sans-serif; 
            background: #e8e8e8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }
        
        #app {
            width: min(100vw, 430px);
            height: 100dvh;
            max-height: 100dvh;
            background: #fcf9f8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.12);
        }

        @media (max-width: 480px) {
            body {
                background: #fcf9f8;
                align-items: stretch;
            }

            #app {
                width: 100vw;
                height: 100dvh;
                max-height: 100dvh;
                box-shadow: none;
                border-radius: 0;
            }
        }

        @media (min-width: 481px) {
            body {
                padding: 16px;
                box-sizing: border-box;
            }

            #app {
                height: min(calc(100dvh - 32px), 932px);
                max-height: 932px;
                border-radius: 24px;
            }
        }
        
        #screen-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-bottom: env(safe-area-inset-bottom);
            position: relative;
        }
        #screen-container::-webkit-scrollbar { display: none; }
        #screen-container { scrollbar-width: none; -ms-overflow-style: none; }

        /* Material Icons */
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Font utility classes used by Stitch designs */
        .headline-font, .jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .noto-font, .noto-sans { font-family: 'Noto Sans', sans-serif; }
        .rupee-symbol { font-family: 'Noto Sans', sans-serif; font-weight: 700; }
        
        /* Scrollbar hiding */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Snap scrolling for onboarding */
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }
        
        /* Onboarding visuals */
        .premium-shadow { box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1); }
        .gradient-bg {
            background: radial-gradient(circle at top right, rgba(160, 242, 225, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(254, 179, 0, 0.05), transparent);
        }
        
        /* OTP input focus */
        .otp-input:focus {
            border-bottom: 3px solid #005e52 !important;
            background-color: #fcf9f8;
        }
        
        /* Skeleton pulse */
        .skeleton-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
        
        /* Haptic pulse */
        .haptic-pulse:active { transform: scale(0.95); }
        
        /* Glass panel */
        .glass-panel { background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); }
        
        /* Performance layer hints */
        .will-change-transform { will-change: transform; }
    </style>
</head>
<body>
    <div id="app">

        <nav id="bottom-nav" class="nav-bottom hidden">

    <link rel="stylesheet" href="/src/style.css" media="print" onload="this.media='all'">
    <script type="module" src="/src/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);

                if (isLocalhost) {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(reg => reg.unregister()));
                        if ('caches' in window) {
                            const names = await caches.keys();
                            await Promise.all(names.map(name => caches.delete(name)));
                        }
                        console.log('Service Worker disabled for local dev to avoid stale cache.');
                    } catch (err) {
                        console.log('Service Worker cleanup failed:', err);
                    }
                    return;
                }

                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
