<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SecureSync AI | Zero-Touch Income Insurance</title>
    <meta name="description" content="Parametric income insurance for delivery partners. Money in your UPI in 2 minutes.">
    
    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23005e52'/%3E%3Cpath d='M20 34l8 8 16-20' fill='none' stroke='%23ffffff' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Telugu:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    
    <!-- Tailwind is now compiled via Vite + PostCSS at build time -->
    
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="app" class="app-container">
        <div id="screen-container"></div>
        
        <nav id="bottom-nav" class="nav-bottom hidden">
            <button onclick="router.navigate('home')" class="nav-item" data-nav="home">
                <span class="material-symbols-outlined">home</span>
                <span>Home</span>
            </button>
            <button onclick="router.navigate('coverage')" class="nav-item" data-nav="coverage">
                <span class="material-symbols-outlined">shield_with_heart</span>
                <span>Coverage</span>
            </button>
            <button onclick="router.navigate('payouts')" class="nav-item" data-nav="payouts">
                <span class="material-symbols-outlined">payments</span>
                <span>Payouts</span>
            </button>
            <button onclick="router.navigate('account')" class="nav-item" data-nav="account">
                <span class="material-symbols-outlined">account_circle</span>
                <span>Account</span>
            </button>
        </nav>
    </div>

    <script type="module" src="/src/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);

                if (isLocalhost) {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(reg => reg.unregister()));
                        if ('caches' in window) {
                            const names = await caches.keys();
                            await Promise.all(names.map(name => caches.delete(name)));
                        }
                        console.log('Service Worker disabled for local dev to avoid stale cache.');
                    } catch (err) {
                        console.log('Service Worker cleanup failed:', err);
                    }
                    return;
                }

                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
