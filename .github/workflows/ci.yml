name: SecureSync AI CI

on:
  push:
    branches: [ main, contributions/bhima, bhima-fix ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: securesync-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Check dependency resolution
      run: pip check
    - name: Static Syntax Check
      run: python -m compileall -q .
    - name: Run Tests
      run: |
        PYTHONPATH=${{ github.workspace }}/backend pytest -q --maxfail=1

  frontend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run Frontend Tests
      run: npm run test
    - name: Audit Dependencies (high+ only)
      run: npm audit --audit-level=high
    - name: Build Frontend
      run: npm run build
